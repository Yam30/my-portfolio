<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Director Portfolio | 2026 Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth;
        }

        /* Layout for Minimal Clutter */
        .masonry-grid {
            column-count: 2;
            column-gap: 1.5rem;
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }

        .creative-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: #151515;
            transition: transform 0.4s ease;
        }

        .creative-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: all 0.5s ease;
            filter: grayscale(20%);
        }

        .creative-item:hover { transform: scale(1.02); z-index: 10; }
        .creative-item:hover img { filter: grayscale(0%); transform: scale(1.05); }

        /* Smooth Header Blur */
        .header-glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Lightbox Effect */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
        }
        #lightbox img { max-height: 90vh; max-width: 95%; border-radius: 4px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="fixed top-0 left-0 w-full z-50 header-glass px-8 py-6 flex justify-between items-center">
        <div>
            <h2 class="font-black text-xl tracking-tighter uppercase leading-none">ART<span class="text-indigo-500">DIRECTOR.</span></h2>
            <p class="text-[8px] tracking-[0.4em] text-zinc-500 font-bold mt-1 uppercase">Visual Inventory 2026</p>
        </div>
        <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest text-zinc-400">
            <span class="hover:text-white cursor-pointer transition">Automotive</span>
            <span class="hover:text-white cursor-pointer transition">Healthcare</span>
            <span class="hover:text-white cursor-pointer transition">Commerce</span>
        </div>
    </nav>

    <main class="mt-40 max-w-[1400px] mx-auto">
        
        <header class="mb-24 px-4">
            <h1 class="text-6xl md:text-9xl font-black tracking-tighter uppercase leading-[0.85] mb-10">
                Selected <br> <span class="text-zinc-800">Works.</span>
            </h1>
            <p class="max-w-xl text-zinc-400 text-lg font-light leading-relaxed border-l-2 border-indigo-600 pl-6">
                Specializing in high-fidelity visual design and creative systems. This archive showcases 70+ ads optimized for premium brand storytelling.
            </p>
        </header>

        <div class="masonry-grid" id="portfolio-gallery">
            </div>

    </main>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="Full View">
    </div>

    <footer class="mt-40 py-20 border-t border-zinc-900 text-center">
        <p class="text-zinc-600 text-[10px] tracking-[0.5em] uppercase">End of Archive</p>
    </footer>

    <script>
        const gallery = document.getElementById('portfolio-gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        
        // Total images count - set this to 72 or 90
        const totalImages = 72; 

        for (let i = 1; i <= totalImages; i++) {
            let fileName = i < 10 ? '0' + i : i;
            
            const item = document.createElement('div');
            item.className = 'creative-item';
            
            const img = document.createElement('img');
            img.src = `${fileName}.jpg`;
            img.loading = 'lazy'; // Boosts performance
            img.alt = `Creative Work ${fileName}`;
            
            // Open full view on click
            item.onclick = () => {
                lightboxImg.src = `${fileName}.jpg`;
                lightbox.style.display = 'flex';
            };

            item.appendChild(img);
            gallery.appendChild(item);
        }
    </script>

</body>
</html>
