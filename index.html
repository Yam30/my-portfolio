<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior Creative Director Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .ad-card { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; transition: 0.3s; width: 100%; height: auto; }
        .ad-card:hover { transform: translateY(-5px); border-color: #6366f1; }
        .section-tag { letter-spacing: 0.3em; text-transform: uppercase; font-size: 0.7rem; color: #6366f1; font-weight: 700; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="mb-20">
        <h1 class="text-5xl md:text-8xl font-black tracking-tighter uppercase mb-4">Creative <span class="text-indigo-600">Director.</span></h1>
        <p class="text-zinc-500 max-w-xl">10 Years of Industry Excellence in Visual Strategy and Art Direction.</p>
    </header>

    <section class="mb-20">
        <p class="section-tag mb-4">Sector 01: Automotive & Festive</p>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <img src="New Year 2026 mg.jpg" class="ad-card" alt="New Year">
            <img src="diwali mg.jpg" class="ad-card" alt="Diwali">
            <img src="dashera.jpg" class="ad-card" alt="Dussehra">
            <img src="christmas post.jpg" class="ad-card" alt="Christmas">
            <img src="EV offer.jpg" class="ad-card" alt="EV Offer">
            <img src="gandhi jayanti.jpg" class="ad-card" alt="Gandhi Jayanti">
            <img src="dhan teras.jpg" class="ad-card" alt="Dhanteras">
            <img src="bhalaghat mahaustav2.jpg" class="ad-card" alt="Event">
        </div>
    </section>

    <section class="mb-20 bg-zinc-950 p-6 rounded-3xl">
        <p class="section-tag mb-4">Sector 02: Performance & Spiritual Ads</p>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <img src="72 hours.jpg" class="ad-card" alt="72h">
            <img src="72 hours ad.jpg" class="ad-card" alt="72h Ad">
            <img src="72 hours ad 2.jpg" class="ad-card" alt="72h Ad 2">
            <img src="IC-102_1_1.jpg" class="ad-card" alt="IC 102">
            <img src="IC-103_1_1.jpg" class="ad-card" alt="IC 103">
            <img src="IC-107_1_1.jpg" class="ad-card" alt="IC 107">
            <img src="IC-90_1_1.jpg" class="ad-card" alt="IC 90">
            <img src="MAW-29_1_1.jpg" class="ad-card" alt="MAW 29">
            <img src="MAW-30_1_1.jpg" class="ad-card" alt="MAW 30">
            <img src="MAW-31_1_1.jpg" class="ad-card" alt="MAW 31">
            <img src="MAW ad 02.jpg" class="ad-card" alt="MAW 02">
            <img src="MAW ad 03 1x1.jpg" class="ad-card" alt="MAW 03">
        </div>
    </section>

    <section class="mb-20">
        <p class="section-tag mb-4">Sector 03: Clinical Minimalism</p>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <img src="nilesh kidney.jpg" class="ad-card" alt="Kidney">
            <img src="ashish cancer opd.jpg" class="ad-card" alt="Cancer">
            <img src="baby care.jpg" class="ad-card" alt="Baby Care">
            <img src="IBS.jpg" class="ad-card" alt="IBS">
            <img src="piles treatment.jpg" class="ad-card" alt="Piles">
            <img src="hepatitis.jpg" class="ad-card" alt="Hepatitis">
            <img src="gallbladder.jpg" class="ad-card" alt="Gallbladder">
            <img src="defficiency of vitamin D.jpg" class="ad-card" alt="Vitamin D">
            <img src="akal daad.jpg" class="ad-card" alt="Dental">
            <img src="pediatrician.jpg" class="ad-card" alt="Pediatrics">
        </div>
    </section>

    <section class="mb-20">
        <p class="section-tag mb-4">Sector 04: Conceptual Art & Strategy</p>
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <img src="Lal kitab ads.jpg" class="ad-card" alt="Lal Kitab">
            <img src="PPK 2 ad.jpg" class="ad-card" alt="PPK">
            <img src="ad03.jpg" class="ad-card" alt="Ad 03">
            <img src="ad 5.jpg" class="ad-card" alt="Ad 5">
            <img src="banner.jpg" class="ad-card" alt="Banner">
            <img src="manifestation webinar.jpg" class="ad-card" alt="Webinar">
        </div>
    </section>

    <footer class="text-center py-20 border-t border-zinc-900">
        <p class="text-zinc-500 mb-4 uppercase tracking-widest text-xs">Available for New Projects</p>
        <h2 class="text-3xl font-bold mb-8">Work with the Expert.</h2>
        <a href="mailto:your-email@gmail.com" class="bg-white text-black px-10 py-3 rounded-full font-bold hover:bg-indigo-600 hover:text-white transition">Hire Me</a>
    </footer>

</body>
</html>
